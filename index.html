<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live Score</title>

<style>
body{
    background:#111827;
    color:white;
    font-family:Arial,sans-serif;
    text-align:center;
    padding:20px;
}

.card{
    background:#1f2937;
    padding:15px;
    margin:15px auto;
    border-radius:10px;
    max-width:500px;
}

.live{
    color:red;
    font-weight:bold;
}
</style>
</head>
<body>

<h1>⚽🏏 Live Score</h1>

<div class="card">
    <h2>Football</h2>
    <p class="live">LIVE</p>
    <p>Team A 1 - 0 Team B</p>
</div>

<div class="card">
    <h2>Cricket</h2>
    <p class="live">LIVE</p>
    <p>Bangladesh 120/3 (15.2)</p>
</div>

</body>
